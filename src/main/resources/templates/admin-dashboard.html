<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Lost & Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    :root{--pink:#ff6b9d;--orange:#ff9a3c;--yellow:#ffd166;--teal:#06d6a0;--blue:#4cc9f0;--purple:#845ef7;--text:#1a0533;--muted:#7b6a92;--soft:#f8f5ff}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--soft);color:var(--text);min-height:100vh}

    .mesh-bg{position:fixed;inset:0;z-index:0;
      background:radial-gradient(ellipse 60% 50% at 10% 5%,#ffd6e8 0%,transparent 55%),
                 radial-gradient(ellipse 55% 55% at 90% 90%,#d0f0ff 0%,transparent 55%),
                 radial-gradient(ellipse 50% 50% at 50% 50%,#fff5d6 0%,transparent 60%),#f8f5ff;
      animation:ms 14s ease-in-out infinite alternate}
    @keyframes ms{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(20deg)}}

    nav{position:sticky;top:0;z-index:999;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);
      border-bottom:2px solid rgba(255,255,255,.95);box-shadow:0 4px 30px rgba(132,94,247,.1);
      padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}
    .brand{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800;text-decoration:none;
      background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .nav-badge{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;
      border-radius:50px;padding:.2rem .8rem;font-size:.7rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
    .nav-r{display:flex;align-items:center;gap:.8rem}
    .pill{padding:.44rem 1.1rem;border-radius:50px;font-family:'Plus Jakarta Sans',sans-serif;
      font-size:.82rem;font-weight:600;text-decoration:none;transition:all .3s ease;display:inline-flex;align-items:center;gap:.4rem;border:none;cursor:pointer}
    .pill-o{background:rgba(255,255,255,.8);border:1.5px solid rgba(132,94,247,.25);color:var(--purple)}
    .pill-o:hover{background:var(--purple);color:#fff}
    .pill-d{background:rgba(255,107,157,.1);border:1.5px solid rgba(255,107,157,.3);color:#cc2255}
    .pill-d:hover{background:rgba(255,107,157,.2);color:#cc2255}

    main{position:relative;z-index:1;padding:2.5rem 2rem}
    .page-header{margin-bottom:2rem;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem}
    .eyebrow{font-size:.72rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;
      background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;margin-bottom:.4rem}
    h1.pt{font-family:'Syne',sans-serif;font-size:2.4rem;font-weight:800;color:var(--text)}

    .summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem;margin-bottom:2rem}
    .sum-card{background:rgba(255,255,255,.85);backdrop-filter:blur(15px);border:2px solid rgba(255,255,255,.95);
      border-radius:20px;padding:1.5rem 2rem;position:relative;overflow:hidden;
      box-shadow:0 8px 30px rgba(132,94,247,.08);transition:all .35s ease}
    .sum-card:hover{transform:translateY(-5px);box-shadow:0 16px 45px rgba(132,94,247,.15)}
    .sum-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:20px 20px 0 0}
    .sum-card:nth-child(1)::before{background:linear-gradient(90deg,var(--purple),var(--pink))}
    .sum-card:nth-child(2)::before{background:linear-gradient(90deg,var(--teal),var(--blue))}
    .sum-card:nth-child(3)::before{background:linear-gradient(90deg,var(--orange),var(--yellow))}
    .sum-val{font-family:'Syne',sans-serif;font-size:2.5rem;font-weight:800;line-height:1;margin-bottom:.3rem}
    .sum-card:nth-child(1) .sum-val{background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .sum-card:nth-child(2) .sum-val{background:linear-gradient(135deg,var(--teal),var(--blue));  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .sum-card:nth-child(3) .sum-val{background:linear-gradient(135deg,var(--orange),var(--yellow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .sum-lbl{color:var(--muted);font-size:.82rem;font-weight:500}

    .table-wrap{background:rgba(255,255,255,.88);backdrop-filter:blur(20px);
      border:2px solid rgba(255,255,255,.95);border-radius:24px;overflow:hidden;
      box-shadow:0 10px 40px rgba(132,94,247,.1)}
    .table-top{padding:1.5rem 2rem;border-bottom:2px solid rgba(248,245,255,.9);
      display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;
      background:linear-gradient(135deg,rgba(132,94,247,.04),rgba(255,107,157,.04))}
    .table-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;color:var(--text)}
    .search-w{display:flex;align-items:center;background:var(--soft);border:2px solid rgba(132,94,247,.15);
      border-radius:50px;padding:.45rem 1rem;gap:.5rem;transition:all .3s ease}
    .search-w:focus-within{border-color:var(--purple);box-shadow:0 0 0 3px rgba(132,94,247,.1)}
    .search-w i{color:#c4b5d8;font-size:.9rem}
    .search-w input{background:none;border:none;outline:none;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.85rem;width:200px}
    .search-w input::placeholder{color:#c4b5d8}

    table{width:100%;border-collapse:collapse}
    thead tr{background:rgba(248,245,255,.8)}
    th{padding:1rem 1.5rem;font-size:.7rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
      color:var(--muted);text-align:left;border-bottom:2px solid rgba(248,245,255,.9);white-space:nowrap}
    td{padding:1.1rem 1.5rem;font-size:.9rem;border-bottom:1px solid rgba(248,245,255,.9);vertical-align:middle}
    tbody tr{transition:background .2s ease}
    tbody tr:hover{background:rgba(132,94,247,.03)}
    tbody tr:last-child td{border-bottom:none}

    .id-cell{color:var(--muted);font-size:.78rem;font-variant-numeric:tabular-nums;font-weight:600}
    .item-name{font-weight:700;color:var(--text)}
    .cat-tag{display:inline-flex;align-items:center;padding:.22rem .7rem;border-radius:50px;
      background:rgba(132,94,247,.08);border:1.5px solid rgba(132,94,247,.18);
      font-size:.75rem;font-weight:700;color:var(--purple)}
    .loc-txt{color:var(--muted);font-size:.85rem}

    .badge-av{display:inline-flex;align-items:center;gap:.35rem;padding:.3rem .85rem;border-radius:50px;
      background:rgba(6,214,160,.1);border:1.5px solid rgba(6,214,160,.3);
      color:#059669;font-size:.76rem;font-weight:700}
    .badge-av::before{content:'';width:6px;height:6px;border-radius:50%;background:#06d6a0;animation:pd 2s infinite}
    @keyframes pd{0%,100%{opacity:1}50%{opacity:.3}}
    .badge-cl{display:inline-flex;align-items:center;gap:.35rem;padding:.3rem .85rem;border-radius:50px;
      background:rgba(124,100,146,.08);border:1.5px solid rgba(124,100,146,.2);
      color:var(--muted);font-size:.76rem;font-weight:600}

    .btn-claim{padding:.42rem 1rem;border-radius:50px;
      background:linear-gradient(135deg,var(--purple),var(--pink));border:none;
      color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:.8rem;font-weight:700;
      cursor:pointer;text-decoration:none;transition:all .3s ease;display:inline-flex;align-items:center;gap:.35rem;
      box-shadow:0 4px 15px rgba(132,94,247,.3);white-space:nowrap}
    .btn-claim:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(132,94,247,.4);color:#fff}
    .no-action{color:var(--muted);font-size:.82rem;display:flex;align-items:center;gap:.3rem}

    @media(max-width:768px){
      nav{padding:1rem}.summary-row{grid-template-columns:1fr}
      main{padding:1.5rem 1rem}th,td{padding:.8rem 1rem}.search-w input{width:130px}
    }
  </style>
</head>
<body>
<div class="mesh-bg"></div>

<nav>
  <div style="display:flex;align-items:center;gap:.8rem">
    <a href="/" class="brand">Lost & Found ✨</a>
    <span class="nav-badge">Admin</span>
  </div>
  <div class="nav-r">
    <a href="/" class="pill pill-o"><i class="bi bi-house-fill"></i>Home</a>
    <a href="/logout" class="pill pill-d"><i class="bi bi-box-arrow-right"></i>Logout</a>
  </div>
</nav>

<main>
  <div style="max-width:1200px;margin:0 auto">
    <div class="page-header">
      <div>
        <span class="eyebrow">Administration</span>
        <h1 class="pt">Manage Found Items 📋</h1>
      </div>
    </div>

    <div class="summary-row" th:if="${items}">
      <div class="sum-card">
        <div class="sum-val" th:text="${#lists.size(items)}">0</div>
        <div class="sum-lbl">Total Items</div>
      </div>
      <div class="sum-card">
        <div class="sum-val" th:text="${#lists.size(items.?[status == 'Available'])}">0</div>
        <div class="sum-lbl">Available</div>
      </div>
      <div class="sum-card">
        <div class="sum-val" th:text="${#lists.size(items.?[status == 'Claimed'])}">0</div>
        <div class="sum-lbl">Claimed</div>
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-top">
        <div class="table-title">All Submissions</div>
        <div class="search-w">
          <i class="bi bi-search"></i>
          <input type="text" id="si" placeholder="Filter items..." oninput="ft()">
        </div>
      </div>
      <div style="overflow-x:auto">
        <table id="itbl">
          <thead>
            <tr>
              <th>ID</th><th>Item Name</th><th>Category</th><th>Location</th><th>Status</th><th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="item : ${items}">
              <td class="id-cell" th:text="'#' + ${item.id}"></td>
              <td><span class="item-name" th:text="${item.itemName}"></span></td>
              <td><span class="cat-tag" th:text="${item.category}"></span></td>
              <td><span class="loc-txt" th:text="${item.location}"></span></td>
              <td>
                <span class="badge-av" th:if="${item.status == 'Available'}">Available</span>
                <span class="badge-cl" th:if="${item.status == 'Claimed'}"><i class="bi bi-check2"></i>Claimed</span>
              </td>
              <td>
                <a th:if="${item.status == 'Available'}" th:href="@{/claim/{id}(id=${item.id})}" class="btn-claim">
                  <i class="bi bi-check-circle-fill"></i>Mark Claimed
                </a>
                <span th:if="${item.status == 'Claimed'}" class="no-action"><i class="bi bi-dash"></i>No action</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script>
  function ft(){
    const q=document.getElementById('si').value.toLowerCase();
    document.querySelectorAll('#itbl tbody tr').forEach(r=>{
      r.style.display=r.textContent.toLowerCase().includes(q)?'':'none';
    });
  }
</script>
</body>
</html>
